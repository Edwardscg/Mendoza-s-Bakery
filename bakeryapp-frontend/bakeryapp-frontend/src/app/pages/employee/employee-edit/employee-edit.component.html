<form [formGroup]="$form()" (ngSubmit)="operate()" class="example-container">

    <!-- ID oculto -->
    <div hidden>
        <mat-form-field>
            <mat-label>ID</mat-label>
            <input matInput placeholder="ID" formControlName="idEmployee">
        </mat-form-field>
    </div>

    <!-- FIRST NAME -->
    <mat-form-field>
        <mat-label>FIRST NAME</mat-label>
        <input matInput placeholder="First Name" formControlName="firstName">
    </mat-form-field>

    <!-- LAST NAME -->
    <mat-form-field>
        <mat-label>LAST NAME</mat-label>
        <input matInput placeholder="Last Name" formControlName="lastName">
    </mat-form-field>

    <!-- DNI -->
    <mat-form-field>
        <mat-label>DNI</mat-label>
        <input matInput placeholder="DNI" formControlName="dni">
    </mat-form-field>

    <!-- PHONE -->
    <mat-form-field>
        <mat-label>PHONE</mat-label>
        <input matInput placeholder="Phone" formControlName="phone">
    </mat-form-field>

    <!-- EMAIL -->
    <mat-form-field>
        <mat-label>EMAIL</mat-label>
        <input matInput placeholder="Email" formControlName="email">
    </mat-form-field>

    <!-- POSITION -->
    <mat-form-field>
        <mat-label>POSITION</mat-label>
        <input matInput placeholder="Position" formControlName="position">
    </mat-form-field>

    <!-- STATUS -->
    <mat-form-field>
        <mat-label>STATUS</mat-label>
        <input matInput placeholder="Status (true/false)" formControlName="status">
    </mat-form-field>

    <!-- BOTONES -->
    <button mat-flat-button type="submit">
        <span>OK</span>
        <mat-icon>done</mat-icon>
    </button>

    <button mat-flat-button type="button" class="cancel-button" routerLink="/pages/employee">
        <span>Cancel</span>
        <mat-icon>cancel</mat-icon>
    </button>

</form>
