<div class="example-container">
  <mat-toolbar class="example-toolbar">
    <button mat-icon-button (click)="sidenav.toggle()">
      @if (!sidenav.opened) {
      <mat-icon>menu</mat-icon>
      }@else {
      <mat-icon>close</mat-icon>
      }
    </button>

    <span>Capibara's App</span>

    <span class="example-spacer"></span>

    <button mat-icon-button [matMenuTriggerFor]="menu">
      <mat-icon>more_vert</mat-icon>
    </button>

    <mat-menu #menu="matMenu">
      <button mat-menu-item>
        <mat-icon>account_box</mat-icon>
        <span>My account</span>
      </button>
      <button mat-menu-item (click)="sidenav.opened = false" >
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <mat-sidenav-container class="example-sidenav-container">
    <mat-sidenav #sidenav style="width: 250px" mode="push">

      <img src="carpincho.png" width="128" style="margin-left: 20px">

      <mat-divider></mat-divider>
      <button class="myButton" [routerLinkActive]="['active']"  mat-menu-item (click)="sidenav.toggle()"
              routerLink="/pages/search" >
        <mat-icon>search</mat-icon>
        <span>Search</span>
      </button>
      <mat-divider></mat-divider>
      <button class="myButton" [routerLinkActive]="['active']"  mat-menu-item (click)="sidenav.toggle()"
              routerLink="/pages/rental" >
        <mat-icon>view_carousel</mat-icon>
        <span>Register Rental</span>
      </button>
      <mat-divider></mat-divider>
      <button class="myButton" [routerLinkActive]="['active']" mat-menu-item (click)="sidenav.toggle()"
              routerLink="/pages/customer" >
        <mat-icon>star_rate</mat-icon>
        <span>Customer</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/pages/employee">
      <mat-icon>badge</mat-icon>
      <span>Employees</span>
      </button>
      <button class="myButton" [routerLinkActive]="['active']" mat-menu-item (click)="sidenav.toggle()"
              routerLink="/pages/supplier" >
        <mat-icon>healing</mat-icon>
        <span>Supplier</span>
      </button>
      <mat-divider></mat-divider>
      <button class="myButton" mat-menu-item [matMenuTriggerFor]="productMenu">
        <mat-icon>inventory_2</mat-icon>
        <span>Product</span>
      </button>
      <mat-menu #productMenu="matMenu">
        <button mat-menu-item routerLink="/pages/product" (click)="sidenav.toggle()">
          <mat-icon>inventory_2</mat-icon>
          <span>Product</span>
        </button>
        <button mat-menu-item routerLink="/pages/product-category" (click)="sidenav.toggle()">
          <mat-icon>category</mat-icon>
          <span>Product Category</span>
        </button>
      </mat-menu>
      <mat-divider></mat-divider>
      <button class="myButton" [routerLinkActive]="['active']"  mat-menu-item (click)="sidenav.toggle()"
              routerLink="/pages/company">
        <mat-icon>accessibility</mat-icon>
        <span>Company</span>
      </button>
      <mat-divider></mat-divider>
      <button class="myButton" [routerLinkActive]="['active']"  mat-menu-item (click)="sidenav.toggle()"
              routerLink="/pages/report" >
        <mat-icon>assessment</mat-icon>
        <span>Report</span>
      </button>
      <mat-divider></mat-divider>
    </mat-sidenav>

    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>

  </mat-sidenav-container>
</div>
