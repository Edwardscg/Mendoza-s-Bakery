<div class="layout">

  <!-- TOP BAR -->
  <mat-toolbar class="topbar">

    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon>{{ sidenav.opened ? 'close' : 'menu' }}</mat-icon>
    </button>

    <span class="title">Capibara ERP</span>

    <span class="spacer"></span>

    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item>
        <mat-icon>person</mat-icon>
        Profile
      </button>

      <button mat-menu-item>
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </mat-menu>

  </mat-toolbar>

  <!-- SIDENAV -->
  <mat-sidenav-container class="container">

    <mat-sidenav #sidenav mode="side" class="sidenav" opened>

      <div class="logo">
        <img src="carpincho.png" />
        <h3>ERP System</h3>
      </div>

      <mat-divider></mat-divider>

      <!-- DASHBOARD -->
      <button mat-menu-item routerLink="/pages/dashboard" (click)="sidenav.close()">
        <mat-icon>dashboard</mat-icon>
        Dashboard
      </button>

      <mat-divider></mat-divider>

      <!-- BUSINESS MODULE -->
      <div class="section-title">Business</div>

      <button mat-menu-item routerLink="/pages/customer" (click)="sidenav.close()">
        <mat-icon>people</mat-icon>
        Customers
      </button>

      <button mat-menu-item routerLink="/pages/employee" (click)="sidenav.close()">
        <mat-icon>badge</mat-icon>
        Employees
      </button>

      <button mat-menu-item routerLink="/pages/supplier" (click)="sidenav.close()">
        <mat-icon>local_shipping</mat-icon>
        Suppliers
      </button>

      <mat-divider></mat-divider>

      <!-- INVENTORY -->
      <div class="section-title">Inventory</div>

      <button mat-menu-item routerLink="/pages/product" (click)="sidenav.close()">
        <mat-icon>inventory_2</mat-icon>
        Products
      </button>

      <button mat-menu-item routerLink="/pages/product-category" (click)="sidenav.close()">
        <mat-icon>category</mat-icon>
        Product Categories
      </button>

      <mat-divider></mat-divider>

      <!-- RECIPES -->
      <div class="section-title">Production</div>

      <button mat-menu-item routerLink="/pages/recipe" (click)="sidenav.close()">
        <mat-icon>restaurant_menu</mat-icon>
        Recipes
      </button>

      <button mat-menu-item routerLink="/pages/recipe-production" (click)="sidenav.close()">
        <mat-icon>factory</mat-icon>
        Recipe Production
      </button>

      <mat-divider></mat-divider>

      <!-- SALES -->
      <div class="section-title">Sales</div>

      <button mat-menu-item routerLink="/pages/sales" (click)="sidenav.close()">
        <mat-icon>point_of_sale</mat-icon>
        Sales
      </button>

      <button mat-menu-item routerLink="/pages/purchases" (click)="sidenav.close()">
        <mat-icon>shopping_cart</mat-icon>
        Purchases
      </button>

      <mat-divider></mat-divider>

      <!-- REPORTS -->
      <div class="section-title">Reports</div>

      <button mat-menu-item routerLink="/pages/report" (click)="sidenav.close()">
        <mat-icon>analytics</mat-icon>
        Reports
      </button>

    </mat-sidenav>

    <!-- CONTENT -->
    <mat-sidenav-content class="content">

      <router-outlet></router-outlet>

    </mat-sidenav-content>

  </mat-sidenav-container>

</div>
