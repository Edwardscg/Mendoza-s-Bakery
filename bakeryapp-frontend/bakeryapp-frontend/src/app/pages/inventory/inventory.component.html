<router-outlet></router-outlet>

<mat-form-field>
  <mat-label>Filter Inventory</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Flour or Confectionery" #input>
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="$dataSource()" matSort>

    <ng-container matColumnDef="idInventory">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let row"> {{row.idInventory}} </td>
    </ng-container>

    <ng-container matColumnDef="product">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> PRODUCT </th>
      <td mat-cell *matCellDef="let row"> {{row.product?.name}} </td>
    </ng-container>

    <ng-container matColumnDef="stock">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> STOCK </th>
      <td mat-cell *matCellDef="let row"> {{row.stock}} </td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> PRICE </th>
    <td mat-cell *matCellDef="let row"> {{row.product?.price | currency}} </td>
    </ng-container>

    <ng-container matColumnDef="lastUpdated">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> LAST UPDATED </th>
      <td mat-cell *matCellDef="let row"> {{row.lastUpdated}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ACTIONS </th>
      <td mat-cell *matCellDef="let row">
        <button mat-flat-button [routerLink]="['edit', row.idInventory]">
          <span>Edit</span>
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-flat-button class="cancel-button" (click)="delete(row.idInventory)">
          <span>Delete</span>
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="6">No data matching the filter "{{input.value}}"</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of inventory items"></mat-paginator>

  <button mat-fab style="float: right;" routerLink="/pages/inventory/new">
    <mat-icon>add</mat-icon>
  </button>
</div>
