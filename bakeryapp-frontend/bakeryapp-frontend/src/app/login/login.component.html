<div class="login-page">

  <div class="login-panel">

    <div class="logo-section">

      <div class="logo">
        <img src="carpincho.png" />
        <h3>ERP System</h3>
      </div>

      <h1>Capibara ERP</h1>

      <p>
        Bakery Management System
      </p>

    </div>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="login()"
      class="login-form"
    >

      <div class="field">

        <label>Email</label>

        <input
          type="email"
          formControlName="username"
          placeholder="email@example.com"
        >

      </div>

      <div class="field">

        <label>Password</label>

        <input
          type="password"
          formControlName="password"
          placeholder="Enter password"
        >

      </div>

      <a
        routerLink="/forgot"
        class="forgot-password"
      >
        Forgot password?
      </a>

      <button
        type="submit"
        class="login-button"
        [disabled]="!isFormValid() || isLoggingIn()"
      >
        {{ isLoggingIn() ? 'Signing In...' : 'Sign In' }}
      </button>

    </form>

  </div>

</div>
